<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>🤣 Joke Generator</h1>
            
            <div class="joke-display">
                <p id="jokeText" class="joke-text">Click the button to get a random joke!</p>
                <p id="jokeType" class="joke-type"></p>
            </div>
            
            <div class="button-group">
                <button id="generateBtn" class="btn btn-primary">Get a Joke</button>
                <button id="copyBtn" class="btn btn-secondary">Copy Joke</button>
            </div>
            
            <div class="loading" id="loading" style="display: none;">
                <span class="spinner"></span>
                <p>Loading joke...</p>
            </div>
            
            <div class="error" id="error" style="display: none;"></div>
            
            <div class="footer">
                <p>Powered by JokeAPI</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
